server:
  port: 8080

spring:
  application:
    name: agrofinance-backend

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:agrofinance_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: AgroFinanceHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  level:
    root: INFO
    com.agrofinance: DEBUG
    org.hibernate.SQL: DEBUG

jwt:
  secret: ${JWT_SECRET:ICCr2TVfC00lLMm/8rczlpo/JfQPcWybnar4s/tiODsb29SsNHbgNfYYhcFfZoFZ}
  expiration: ${JWT_EXPIRATION:86400000} # 24 hours, in milliseconds

storage:
  upload-dir: ${UPLOAD_DIR:uploads}
  max-file-size: 5242880 # 5 MB in bytes, service-level check

gemini:
  # NO default fallback here, unlike DB/JWT — a leaked AI key bills a
  # real Google account. Set GEMINI_API_KEY in your launch environment.
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-3.5-flash}
  base-url: https://generativelanguage.googleapis.com/v1beta
  timeout-seconds: 30

weather:
  api-key: ${WEATHER_API_KEY:}
  base-url: https://api.openweathermap.org/data/2.5
